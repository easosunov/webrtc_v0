.chat-item {
    display: flex;
    align-items: center;
    padding: 10px;
    border-bottom: 1px solid #eee;
    transition: background 0.2s;
}

.chat-item:hover {
    background: #f9f9f9;
}

.chat-item button {
    opacity: 0.5;
    transition: opacity 0.2s;
}

.chat-item:hover button {
    opacity: 1;
}

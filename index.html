<div class="main-content">
    <!-- Left side: Video section -->
    <div class="video-section">
        <div class="video-container" id="video-container">
            <div class="video-box">
                <video id="local-video" autoplay playsinline muted></video>
            </div>
            <div class="video-box">
                <video id="remote-video" autoplay playsinline></video>
            </div>
        </div>
        
        <div class="call-controls">
            <button class="call-btn hangup" id="hangup-btn" disabled>Hang Up</button>
            <button id="switch-camera-btn" class="camera-switch-btn" onclick="switchCamera()" style="display: none;">
                🔄 Switch Camera
            </button>
        </div>
    </div>
    
    <!-- Chat Section (NEW - between video and right panels) -->
    <div class="chat-section">
        <div class="chat-layout">
            <!-- Left sidebar - Chats list -->
            <div class="chats-sidebar" id="chats-view">
                <div class="chats-header">
                    <h3>Chats</h3>
                    <button class="new-chat-btn" onclick="showUsersForChat()">➕ New Chat</button>
                </div>
                <div id="chats-container">
                    <!-- Chats will be loaded here -->
                </div>
            </div>
            
            <!-- Right side - Active chat -->
            <div class="chat-view" id="chat-view" style="display: none;">
                <div class="chat-view-header">
                    <button class="back-btn" onclick="closeChat()">←</button>
                    <h3 id="current-chat-name">Select a chat</h3>
                </div>
                <div class="chat-messages-container" id="chat-messages">
                    <!-- Messages will be loaded here -->
                </div>
                <div class="chat-input-area">
                    <input type="text" id="message-input" placeholder="Type a message...">
                    <button onclick="sendMessage()">Send</button>
                </div>
                <input type="hidden" id="current-chat-id">
            </div>
        </div>
    </div>
    
    <!-- Right side: Original panels -->
    <div class="right-panels">
        <!-- Available Users Panel (top) -->
        <div class="users-panel">
            <h3>Available Users</h3>
            <div id="users-container"></div>
        </div>
        
        <!-- Android Background Listener Panel (bottom) -->
        <div class="apk-panel">
            <div class="apk-header">
                <span>📱</span>
                <h4>Android Background Listener</h4>
            </div>
            <div class="apk-description">
                Start the background service to receive notifications when browser is closed.
                The APK will notify you, then you open the browser to answer normally.
            </div>
            <div class="apk-buttons">
                <button id="startApkBtn" onclick="startApkListener()" class="apk-start-btn">
                    ▶️ Start Listener
                </button>
                <button onclick="stopApkListener()" class="apk-stop-btn">
                    ⏹️ Stop
                </button>
            </div>
            <div id="apkStatus" class="apk-status">
                ℹ️ Not running
            </div>
        </div>
    </div>
</div>

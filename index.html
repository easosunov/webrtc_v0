<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Communicator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* Login Screen */
        #login-screen {
            padding: 40px;
            background: white;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .keypad {
            max-width: 400px;
            margin: 0 auto;
        }

        .display {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 32px;
            letter-spacing: 4px;
            color: #333;
            font-family: monospace;
            border: 2px solid #e0e0e0;
        }

        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .keypad-btn {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .keypad-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .keypad-btn:active {
            transform: scale(0.95);
        }

        .keypad-btn.special {
            background: #f0f0f0;
            color: #666;
        }

        .keypad-btn::after {
            content: attr(data-key);
            position: absolute;
            bottom: 5px;
            right: 8px;
            font-size: 10px;
            opacity: 0.5;
            color: inherit;
        }

        .keypad-btn:hover::after {
            opacity: 1;
        }

        .enter-btn {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .enter-btn:hover {
            background: #5a67d8;
        }

        .enter-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status-message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }

        .status-message.error {
            background: #fee;
            color: #c33;
        }

        .status-message.success {
            background: #efe;
            color: #3c3;
        }

        .status-message.info {
            background: #eef;
            color: #33c;
        }

        /* Call Screen */
        #call-screen {
            display: none;
            padding: 20px;
        }

        .call-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .user-info {
            font-weight: 600;
            color: #333;
        }

        .user-info span {
            color: #667eea;
            margin-left: 5px;
        }

        .logout-btn {
            background: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .logout-btn:hover {
            background: #d32f2f;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        .video-section {
            display: flex;
            flex-direction: column;
        }

        .video-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .video-box {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 16/9;
            position: relative;
        }

        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #1a1a1a;
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 10;
        }

        .call-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .call-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .call-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .call-btn.call {
            background: #4CAF50;
            color: white;
        }

        .call-btn.hangup {
            background: #f44336;
            color: white;
        }

        /* Users Panel */
        .users-panel {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            height: fit-content;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
        }

        .users-panel h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            background: #f9f9f9;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.2s ease;
        }

        .user-item:hover {
            background: #f0f0f0;
        }

        .user-item:last-child {
            border-bottom: none;
        }

        .user-info-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .user-name {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .user-status-badge {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            background: #e8f5e9;
            color: #4CAF50;
            width: fit-content;
        }

        .ice-status {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            background: #fff3e0;
            color: #ff9800;
            width: fit-content;
        }

        .ice-status.success {
            background: #e8f5e9;
            color: #4CAF50;
        }

        .ice-status.failed {
            background: #ffebee;
            color: #f44336;
        }

        .call-user-btn {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
            min-width: 70px;
        }

        .call-user-btn:hover:not(:disabled) {
            background: #5a67d8;
            transform: scale(1.02);
        }

        .call-user-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .debug-panel {
            margin-top: 20px;
            padding: 15px;
            background: #1e1e1e;
            border-radius: 10px;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .debug-panel .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #fff;
        }

        .debug-panel button {
            background: #333;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 3px 8px;
            cursor: pointer;
            font-size: 11px;
        }

        .debug-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .key-hint {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }

        .key-hint span {
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 4px;
            margin: 0 3px;
            font-family: monospace;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .users-panel {
                max-height: 300px;
            }
        }

        @media (max-width: 768px) {
            .video-container {
                grid-template-columns: 1fr;
            }
            
            .login-header h1 {
                font-size: 24px;
            }
            
            .keypad-btn {
                padding: 15px;
                font-size: 20px;
            }
            
            .keypad-btn::after {
                font-size: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Screen -->
        <div id="login-screen">
            <div class="login-header">
                <h1>📞 WebRTC Communicator</h1>
                <p>Enter your access code to start</p>
            </div>
            
            <div class="keypad">
                <div class="display" id="code-display"></div>
                
                <div class="keypad-grid">
                    <button class="keypad-btn" data-digit="1" data-key="1">1</button>
                    <button class="keypad-btn" data-digit="2" data-key="2">2</button>
                    <button class="keypad-btn" data-digit="3" data-key="3">3</button>
                    <button class="keypad-btn" data-digit="4" data-key="4">4</button>
                    <button class="keypad-btn" data-digit="5" data-key="5">5</button>
                    <button class="keypad-btn" data-digit="6" data-key="6">6</button>
                    <button class="keypad-btn" data-digit="7" data-key="7">7</button>
                    <button class="keypad-btn" data-digit="8" data-key="8">8</button>
                    <button class="keypad-btn" data-digit="9" data-key="9">9</button>
                    <button class="keypad-btn special" data-digit="clear" data-key="C">C</button>
                    <button class="keypad-btn" data-digit="0" data-key="0">0</button>
                    <button class="keypad-btn special" data-digit="back" data-key="⌫">⌫</button>
                </div>
                
                <button class="enter-btn" id="login-btn" disabled>Enter</button>
                
                <div class="key-hint">
                    <span>⌫</span> Backspace • <span>C</span> Clear • <span>Enter</span> Login
                </div>
                
                <div id="login-status" class="status-message"></div>
            </div>
        </div>
        
        <!-- Call Screen -->
        <div id="call-screen">
            <div class="call-header">
                <div class="user-info">
                    Logged in as: <span id="current-user"></span>
                </div>
                <button class="logout-btn" id="logout-btn">Logout</button>
            </div>
            
            <div class="main-content">
                <div class="video-section">
                    <div class="video-container">
                        <div class="video-box">
                            <video id="local-video" autoplay playsinline muted></video>
                            <div class="video-label">You</div>
                        </div>
                        <div class="video-box">
                            <video id="remote-video" autoplay playsinline></video>
                            <div class="video-label">Remote</div>
                        </div>
                    </div>
                    
                    <div class="call-controls">
                        <button class="call-btn hangup" id="hangup-btn" disabled>Hang Up</button>
                    </div>
                </div>
                
                <div class="users-panel">
                    <h3>Available Users</h3>
                    <div id="users-container"></div>
                </div>
            </div>
            
            <div class="debug-panel">
                <div class="header">
                    <span>Debug Console</span>
                    <button id="clear-debug">Clear</button>
                </div>
                <div id="debug-content" class="debug-content"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyChU1sW6u5T0Ho0y0yIPgI1dHFYx-6Q_X8",
            authDomain: "webrtc-v0.firebaseapp.com",
            projectId: "webrtc-v0",
            storageBucket: "webrtc-v0.firebasestorage.app",
            messagingSenderId: "647705075894",
            appId: "1:647705075894:web:d23544a3f8e509f69e8617",
            measurementId: "G-5ZSTJSD2N3"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // ==================== GLOBAL STATE ====================
        const CONFIG = {
            myUsername: null,
            myUid: null,
            isAdmin: false,
            peerConnection: null,
            localStream: null,
            remoteStream: null,
            iceCandidatesQueue: [],
            iceRestartAttempts: 0,
            MAX_ICE_RESTART_ATTEMPTS: 3,
            targetUserId: null,
            isInitiator: false,
            isInCall: false,
            activeCallId: null,
            iceExchangeStatus: new Map(), // Track ICE status per user
            activeCallButtons: new Set() // Track which users are in call
        };

        // DOM Elements
        const loginScreen = document.getElementById('login-screen');
        const callScreen = document.getElementById('call-screen');
        const codeDisplay = document.getElementById('code-display');
        const loginBtn = document.getElementById('login-btn');
        const loginStatus = document.getElementById('login-status');
        const logoutBtn = document.getElementById('logout-btn');
        const currentUserSpan = document.getElementById('current-user');
        const hangupBtn = document.getElementById('hangup-btn');
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const usersContainer = document.getElementById('users-container');
        const debugContent = document.getElementById('debug-content');
        const clearDebugBtn = document.getElementById('clear-debug');

        // ==================== DEBUG LOGGING ====================
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const line = `[${timestamp}] ${message}`;
            debugContent.innerHTML += line + '\n';
            debugContent.scrollTop = debugContent.scrollHeight;
            console.log(message);
        }

        clearDebugBtn.addEventListener('click', () => {
            debugContent.innerHTML = '';
        });

        // ==================== KEYPAD HANDLING ====================
        let currentCode = '';

        function updateDisplay() {
            codeDisplay.textContent = currentCode || '▪'.repeat(6);
            loginBtn.disabled = currentCode.length === 0;
        }

        document.querySelectorAll('.keypad-btn[data-digit]').forEach(btn => {
            btn.addEventListener('click', () => {
                const digit = btn.dataset.digit;
                handleKeypadInput(digit);
            });
        });

        document.addEventListener('keydown', (event) => {
            if (callScreen.style.display === 'block') return;
            
            const key = event.key;
            
            if (/^[0-9]$/.test(key)) {
                event.preventDefault();
                handleKeypadInput(key);
            }
            else if (key === 'Backspace' || key === 'Delete') {
                event.preventDefault();
                handleKeypadInput('back');
            }
            else if (key === 'c' || key === 'C') {
                event.preventDefault();
                handleKeypadInput('clear');
            }
            else if (key === 'Enter') {
                event.preventDefault();
                if (!loginBtn.disabled) {
                    login();
                }
            }
        });

        function handleKeypadInput(digit) {
            if (digit === 'clear') {
                currentCode = '';
            } else if (digit === 'back') {
                currentCode = currentCode.slice(0, -1);
            } else {
                if (currentCode.length < 10) {
                    currentCode += digit;
                }
            }
            updateDisplay();
        }

        // ==================== AUTHENTICATION ====================
        async function login() {
            const accessCode = currentCode;
            if (!accessCode) return;
            
            log(`🔐 Attempting login with code: ${accessCode}`);
            loginStatus.className = 'status-message info';
            loginStatus.textContent = 'Logging in...';
            
            try {
                const userRef = db.collection('users').doc(accessCode);
                const userDoc = await userRef.get();
                
                if (!userDoc.exists) {
                    log(`❌ User ${accessCode} not found in database`);
                    loginStatus.className = 'status-message error';
                    loginStatus.textContent = 'Invalid access code';
                    
                    setTimeout(() => {
                        currentCode = '';
                        updateDisplay();
                        loginStatus.textContent = '';
                    }, 2000);
                    
                    return;
                }
                
                const userData = userDoc.data();
                
                await userRef.update({
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                    online: true
                });
                
                CONFIG.myUsername = accessCode;
                CONFIG.myUid = accessCode;
                CONFIG.isAdmin = userData.isAdmin || false;
                
                currentUserSpan.textContent = userData.displayName || accessCode;
                loginScreen.style.display = 'none';
                callScreen.style.display = 'block';
                loginStatus.textContent = '';
                
                log(`✅ Logged in as ${userData.displayName || accessCode} (${accessCode})`);
                
                initializePresence();
                loadUsers();
                await initMedia();
                
            } catch (error) {
                log(`❌ Login error: ${error.message}`);
                loginStatus.className = 'status-message error';
                loginStatus.textContent = 'Login failed. Please try again.';
            }
        }

        async function logout() {
            try {
                if (CONFIG.myUsername) {
                    await db.collection('users').doc(CONFIG.myUsername).update({
                        online: false,
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                
                if (CONFIG.peerConnection) {
                    CONFIG.peerConnection.close();
                    CONFIG.peerConnection = null;
                }
                
                if (CONFIG.localStream) {
                    CONFIG.localStream.getTracks().forEach(track => track.stop());
                    CONFIG.localStream = null;
                }
                
                CONFIG.myUsername = null;
                CONFIG.myUid = null;
                CONFIG.isAdmin = false;
                CONFIG.isInCall = false;
                
                callScreen.style.display = 'none';
                loginScreen.style.display = 'block';
                currentCode = '';
                updateDisplay();
                
                localVideo.srcObject = null;
                remoteVideo.srcObject = null;
                
                log('👋 Logged out');
                
            } catch (error) {
                log(`❌ Logout error: ${error.message}`);
            }
        }

        loginBtn.addEventListener('click', login);
        logoutBtn.addEventListener('click', logout);

        // ==================== USER PRESENCE ====================
        function initializePresence() {
            setInterval(async () => {
                if (CONFIG.myUsername) {
                    await db.collection('users').doc(CONFIG.myUsername).update({
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                        online: true
                    });
                }
            }, 30000);
            
            window.addEventListener('beforeunload', () => {
                if (CONFIG.myUsername) {
                    db.collection('users').doc(CONFIG.myUsername).update({
                        online: false,
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
            });
        }

        // ==================== LOAD USERS ====================
        async function loadUsers() {
            const usersSnapshot = await db.collection('users').get();
            const users = [];
            
            usersSnapshot.forEach(doc => {
                if (doc.id !== CONFIG.myUsername) {
                    const userData = doc.data();
                    users.push({
                        username: doc.id,
                        displayName: userData.displayName || doc.id,
                        isAdmin: userData.isAdmin || false
                    });
                }
            });
            
            renderUsersList(users);
            listenForUsers();
        }

        function listenForUsers() {
            db.collection('users').onSnapshot(snapshot => {
                const users = [];
                snapshot.forEach(doc => {
                    if (doc.id !== CONFIG.myUsername) {
                        const userData = doc.data();
                        users.push({
                            username: doc.id,
                            displayName: userData.displayName || doc.id,
                            isAdmin: userData.isAdmin || false
                        });
                    }
                });
                renderUsersList(users);
            });
        }

        function renderUsersList(users) {
            if (users.length === 0) {
                usersContainer.innerHTML = '<div class="user-item">No other users available</div>';
                return;
            }
            
            let html = '';
            users.forEach(user => {
                const iceStatus = CONFIG.iceExchangeStatus.get(user.username);
                let statusClass = '';
                let statusText = '';
                
                if (iceStatus === 'success') {
                    statusClass = 'success';
                    statusText = 'ICE exchanged';
                } else if (iceStatus === 'failed') {
                    statusClass = 'failed';
                    statusText = 'No ICE';
                }
                
                const isButtonDisabled = CONFIG.activeCallButtons.has(user.username) || 
                                        CONFIG.isInCall || 
                                        !CONFIG.localStream;
                
                html += `
                    <div class="user-item">
                        <div class="user-info-left">
                            <span class="user-name">${user.displayName} ${user.isAdmin ? '👑' : ''}</span>
                            <span class="user-status-badge">Online</span>
                            ${statusText ? `<span class="ice-status ${statusClass}">${statusText}</span>` : ''}
                        </div>
                        <button class="call-user-btn" 
                                onclick="initiateICEExchange('${user.username}')"
                                ${isButtonDisabled ? 'disabled' : ''}>
                            Call
                        </button>
                    </div>
                `;
            });
            usersContainer.innerHTML = html;
        }

        // ==================== ICE EXCHANGE ====================
        async function initiateICEExchange(targetUsername) {
            if (!CONFIG.localStream) {
                alert('Please wait for camera access');
                return;
            }
            
            log(`🔄 Initiating ICE exchange with ${targetUsername}...`);
            
            // Disable the call button for this user
            CONFIG.activeCallButtons.add(targetUsername);
            renderUsersList([]); // Trigger re-render
            
            // Reset ICE status for this user
            CONFIG.iceExchangeStatus.delete(targetUsername);
            
            const callId = `${CONFIG.myUsername}_${targetUsername}_${Date.now()}`;
            CONFIG.activeCallId = callId;
            
            try {
                // Create peer connection
                await createPeerConnection(targetUsername, true, callId);
                
                // Create and send offer
                const offer = await CONFIG.peerConnection.createOffer();
                await CONFIG.peerConnection.setLocalDescription(offer);
                
                // Store offer in Firestore
                await db.collection('calls').doc(callId).set({
                    callerId: CONFIG.myUsername,
                    calleeId: targetUsername,
                    offer: {
                        type: offer.type,
                        sdp: offer.sdp
                    },
                    status: 'ringing',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                log('📤 Offer sent to Firestore');
                
                // Listen for answer
                db.collection('calls').doc(callId).onSnapshot(async (snapshot) => {
                    if (!snapshot.exists) return;
                    
                    const data = snapshot.data();
                    if (data.answer && CONFIG.peerConnection && !CONFIG.peerConnection.currentRemoteDescription) {
                        log('📥 Received answer');
                        try {
                            const answer = new RTCSessionDescription(data.answer);
                            await CONFIG.peerConnection.setRemoteDescription(answer);
                            
                            // Process queued candidates
                            processIceCandidateQueue();
                            
                            // Mark ICE exchange as successful
                            CONFIG.iceExchangeStatus.set(targetUsername, 'success');
                            CONFIG.activeCallButtons.delete(targetUsername);
                            renderUsersList([]);
                            
                        } catch (err) {
                            log(`❌ Error setting remote description: ${err.message}`);
                            CONFIG.iceExchangeStatus.set(targetUsername, 'failed');
                            CONFIG.activeCallButtons.delete(targetUsername);
                            renderUsersList([]);
                        }
                    }
                });
                
                // Set timeout for ICE exchange (30 seconds)
                setTimeout(() => {
                    if (!CONFIG.iceExchangeStatus.has(targetUsername)) {
                        log(`⏰ ICE exchange timeout for ${targetUsername}`);
                        CONFIG.iceExchangeStatus.set(targetUsername, 'failed');
                        CONFIG.activeCallButtons.delete(targetUsername);
                        renderUsersList([]);
                        
                        if (CONFIG.peerConnection) {
                            CONFIG.peerConnection.close();
                            CONFIG.peerConnection = null;
                        }
                    }
                }, 30000);
                
            } catch (error) {
                log(`❌ ICE exchange error: ${error.message}`);
                CONFIG.iceExchangeStatus.set(targetUsername, 'failed');
                CONFIG.activeCallButtons.delete(targetUsername);
                renderUsersList([]);
            }
        }

        window.initiateICEExchange = initiateICEExchange;

        async function createPeerConnection(targetUserId, isInitiator = false, callId) {
            log(`🔧 Creating peer connection with ${targetUserId}`);
            
            CONFIG.targetUserId = targetUserId;
            CONFIG.isInitiator = isInitiator;
            CONFIG.iceRestartAttempts = 0;
            
            const config = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ],
                iceCandidatePoolSize: 10
            };
            
            CONFIG.peerConnection = new RTCPeerConnection(config);
            
            if (CONFIG.localStream) {
                CONFIG.localStream.getTracks().forEach(track => {
                    CONFIG.peerConnection.addTrack(track, CONFIG.localStream);
                });
            }
            
            CONFIG.remoteStream = new MediaStream();
            remoteVideo.srcObject = CONFIG.remoteStream;
            
            CONFIG.peerConnection.ontrack = (event) => {
                log(`📥 Received remote ${event.track.kind} track`);
                event.streams[0].getTracks().forEach(track => {
                    CONFIG.remoteStream.addTrack(track);
                });
            };
            
            CONFIG.peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    log(`🧊 Generated ICE candidate`);
                    
                    // Store candidate in Firestore
                    db.collection('ice-candidates').add({
                        fromUserId: CONFIG.myUsername,
                        toUserId: targetUserId,
                        callId: callId,
                        candidate: event.candidate.toJSON(),
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
            };
            
            CONFIG.peerConnection.oniceconnectionstatechange = () => {
                log(`🧊 ICE state: ${CONFIG.peerConnection.iceConnectionState}`);
                
                if (CONFIG.peerConnection.iceConnectionState === 'connected') {
                    CONFIG.iceExchangeStatus.set(targetUserId, 'success');
                    CONFIG.activeCallButtons.delete(targetUserId);
                    renderUsersList([]);
                }
            };
            
            // Listen for ICE candidates from the other user
            db.collection('ice-candidates')
                .where('toUserId', '==', CONFIG.myUsername)
                .where('fromUserId', '==', targetUserId)
                .where('callId', '==', callId)
                .onSnapshot(snapshot => {
                    snapshot.docChanges().forEach(change => {
                        if (change.type === 'added') {
                            const data = change.doc.data();
                            if (CONFIG.peerConnection) {
                                CONFIG.peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                            }
                        }
                    });
                });
            
            return CONFIG.peerConnection;
        }

        function processIceCandidateQueue() {
            if (!CONFIG.peerConnection || CONFIG.iceCandidatesQueue.length === 0) return;
            
            log(`🔄 Processing ${CONFIG.iceCandidatesQueue.length} queued candidates`);
            CONFIG.iceCandidatesQueue.forEach(candidate => {
                CONFIG.peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            });
            CONFIG.iceCandidatesQueue = [];
        }

        // ==================== MEDIA INITIALIZATION ====================
        async function initMedia() {
            try {
                log('📹 Requesting camera and microphone access...');
                CONFIG.localStream = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                
                localVideo.srcObject = CONFIG.localStream;
                log('✅ Media access granted');
                
            } catch (error) {
                log(`❌ Media access error: ${error.message}`);
                alert('Could not access camera/microphone. Please check permissions.');
            }
        }

        // ==================== CALL CLEANUP ====================
        function cleanupCall() {
            log('🧹 Cleaning up call');
            
            if (CONFIG.peerConnection) {
                CONFIG.peerConnection.close();
                CONFIG.peerConnection = null;
            }
            
            CONFIG.isInCall = false;
            CONFIG.targetUserId = null;
            CONFIG.iceCandidatesQueue = [];
            CONFIG.iceRestartAttempts = 0;
            CONFIG.activeCallId = null;
            
            hangupBtn.disabled = true;
            remoteVideo.srcObject = null;
            
            // Re-enable all call buttons
            CONFIG.activeCallButtons.clear();
            renderUsersList([]);
        }

        hangupBtn.addEventListener('click', cleanupCall);

        // Initialize
        updateDisplay();
        log('🚀 Application loaded');
    </script>
</body>
</html>
